<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>채널 관리 · 부산MBC 온에어</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#6706D3" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="부산MBC 온에어" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
</head>
<body>

<header class="app-header">
  <div class="brand">
    <img src="images/mascot.png" alt="" class="brand-logo">
    <h1>부산MBC 온에어</h1>
  </div>
  <div class="user-box">
    <a class="admin-link" href="player.html">← 플레이어</a>
    <button id="logout-btn" class="logout-btn" aria-label="로그아웃">⏻</button>
  </div>
</header>

<main class="app-main">
  <section class="admin-form-wrap">
    <h2 id="form-title">채널 추가</h2>
    <form id="channel-form" class="admin-form">
      <input id="f-name" type="text" placeholder="이름" required>
      <select id="f-type">
        <option value="tv">TV</option>
        <option value="radio">라디오</option>
      </select>
      <input id="f-path" type="text" placeholder="경로 (예: live/tv1)" required>
      <input id="f-thumb" type="text" placeholder="썸네일 URL (선택)">
      <input id="f-sort" type="number" placeholder="정렬" value="0">
      <label class="chk"><input id="f-enabled" type="checkbox" checked> 노출</label>
      <div class="admin-form-btns">
        <button type="submit">저장</button>
        <button type="button" id="new-btn">새로 입력</button>
      </div>
    </form>
    <p id="admin-msg" class="auth-msg"></p>
  </section>

  <section>
    <table class="admin-table">
      <thead>
        <tr>
          <th>순서</th>
          <th>이름</th>
          <th>타입</th>
          <th>경로</th>
          <th>노출</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="admin-list">
        <!-- JS가 채널 행을 여기에 주입합니다 -->
      </tbody>
    </table>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/supabase.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/channelform.js"></script>
<script src="js/admin.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
